global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Metrics exposed by the OTel Collector's prometheus exporter.
  # These are the Claude Code metrics (token.usage, cost.usage, session.count, ...).
  - job_name: otel-collector
    static_configs:
      - targets: ["otel-collector:8889"]

  # Optional: the collector's own internal telemetry.
  - job_name: otel-collector-internal
    static_configs:
      - targets: ["otel-collector:8888"]
