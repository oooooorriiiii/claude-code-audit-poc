name: claude-code-audit-poc

services:
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.115.1
    container_name: otel-collector
    # Run as the host user so the file exporter can write to the bind-mounted
    # ./data/otel-file directory (which is owned by the host user).
    user: "1000:1000"
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./otel/config.yaml:/etc/otelcol/config.yaml:ro
      - ./data/otel-file:/data/otel-file
    ports:
      - "4317:4317"   # OTLP gRPC (Claude Code -> Collector)
      - "4318:4318"   # OTLP HTTP (Claude Code -> Collector)
      - "8889:8889"   # Prometheus scrape endpoint exposed by the collector
    depends_on:
      - loki
      - tempo
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.55.1
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=30d"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    restart: unless-stopped

  loki:
    image: grafana/loki:3.3.2
    container_name: loki
    command: ["-config.file=/etc/loki/config.yaml"]
    volumes:
      - ./loki/config.yaml:/etc/loki/config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.6.1
    container_name: tempo
    command: ["-config.file=/etc/tempo/config.yaml"]
    volumes:
      - ./tempo/config.yaml:/etc/tempo/config.yaml:ro
      - tempo-data:/var/tempo
    ports:
      - "3200:3200"   # Tempo HTTP (query/API)
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.4.0
    container_name: grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
      # Server-side rendering (PNG export of panels via /render API).
      # Used by demo/capture-grafana.sh to produce slide images.
      - GF_RENDERING_SERVER_URL=http://renderer:8081/render
      - GF_RENDERING_CALLBACK_URL=http://grafana:3000/
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3001:3000"   # host 3000 may be taken; Grafana is on http://localhost:3001
    depends_on:
      - prometheus
      - loki
      - tempo
      - renderer
    restart: unless-stopped

  # Headless Chromium renderer for Grafana panel PNG export.
  renderer:
    image: grafana/grafana-image-renderer:3.11.6
    container_name: grafana-renderer
    environment:
      - ENABLE_METRICS=false
    restart: unless-stopped

volumes:
  prometheus-data:
  loki-data:
  tempo-data:
  grafana-data:
